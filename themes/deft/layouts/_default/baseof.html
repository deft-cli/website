<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}"
        />
        <title>
            {{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.description }}{{
            else }}{{ .Title }} · {{ .Site.Title }}{{ end }}
        </title>
        <link rel="stylesheet" href="/css/main.css" />
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <script>
            // Apply saved/preferred theme before paint to avoid a flash
            (function () {
                var stored = localStorage.getItem("theme");
                var theme =
                    stored ||
                    (window.matchMedia("(prefers-color-scheme: light)")
                        .matches
                        ? "light"
                        : "dark");
                document.documentElement.setAttribute("data-theme", theme);
            })();
        </script>
    </head>
    <body>
        {{ partial "nav.html" . }}

        <main>{{ block "main" . }}{{ end }}</main>

        {{ partial "footer.html" . }}

        <script>
            // Mobile nav toggle
            const btn = document.querySelector(".nav__menu-btn");
            const links = document.querySelector(".nav__links");
            btn?.addEventListener("click", () =>
                links?.classList.toggle("open"),
            );

            // Theme toggle
            document
                .querySelector("#theme-toggle")
                ?.addEventListener("click", () => {
                    const next =
                        document.documentElement.getAttribute(
                            "data-theme",
                        ) === "light"
                            ? "dark"
                            : "light";
                    document.documentElement.setAttribute(
                        "data-theme",
                        next,
                    );
                    localStorage.setItem("theme", next);
                });

            // Active nav link
            document.querySelectorAll(".nav__links a").forEach((a) => {
                if (
                    window.location.pathname.startsWith(
                        a.getAttribute("href"),
                    ) &&
                    a.getAttribute("href") !== "/"
                ) {
                    a.classList.add("active");
                }
            });

            // Copy install command
            document
                .querySelector(".install-pill__copy")
                ?.addEventListener("click", function () {
                    navigator.clipboard.writeText(this.dataset.copy);
                    const orig = this.textContent;
                    this.textContent = "copied";
                    setTimeout(() => (this.textContent = orig), 1500);
                });
        </script>
    </body>
</html>
